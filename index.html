<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Feedback Board</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1f1c2c, #928dab);
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
      }

      .container {
        text-align: center;
        background: rgba(0, 0, 0, 0.4);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        width: 300px;
      }

      h1 {
        margin-bottom: 10px;
        font-size: 26px;
      }

      p {
        margin-bottom: 25px;
        opacity: 0.8;
        font-size: 14px;
      }

      a {
        display: block;
        text-decoration: none;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
        color: white;
      }

      .admin {
        background: #ff4b5c;
      }

      .admin:hover {
        background: #ff2e44;
        transform: scale(1.05);
      }

      .user {
        background: #4caf50;
      }

      .user:hover {
        background: #3e9441;
        transform: scale(1.05);
      }

      /* Footer */
      .footer {
        margin-top: 20px;
        font-size: 13px;
        opacity: 0.7;
        text-align: center;
      }

      .footer a {
        color: #ffffff;
        text-decoration: none;
        font-weight: bold;
        opacity: 0.8;
        transition: 0.3s;
      }

      .footer a:hover {
        opacity: 1;
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>📌 Feedback Board</h1>
      <p>Select your panel to continue</p>

      <a href="login.html" class="admin">🔐 Admin Login</a>
      <a href="user.html" class="user">🟢 User Panel</a>

      <div class="footer">
        Mini Full-Stack Project <br />
        <a href="https://github.com/MahdMsv" target="_blank">
          © Mahdi Mousavi
        </a>
      </div>
    </div>
  </body>
</html>
